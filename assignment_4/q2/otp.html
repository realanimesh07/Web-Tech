<!DOCTYPE html>
<html lang="en">
<head>
    <title>OTP Validator</title>
</head>
<body>
    <h2>OTP Verification</h2>
    
    <button id="generateBtn">Generate 6-Digit OTP</button>
    <p>Your OTP: <strong id="otpDisplay">------</strong></p>

    <hr>

    <input type="text" id="userInput" placeholder="Enter OTP here" maxlength="6">
    <button id="verifyBtn">Verify OTP</button>
    
    <p id="message"></p>

    <script src="script.js"></script>
</body>
</html>
