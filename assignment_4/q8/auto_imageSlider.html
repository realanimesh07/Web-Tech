<!DOCTYPE html>
<html lang="en">
<head>
    <title>Auto-Image Slider</title>
    <style>
        .slider-container { text-align: center; margin-top: 50px; }
        img { width: 500px; height: 300px; border-radius: 10px; object-fit: cover; }
        button { padding: 10px 20px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

<div class="slider-container">
    <img id="sliderImg" src="" alt="Slider Image">
    <br>
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
