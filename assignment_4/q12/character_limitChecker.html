<!DOCTYPE html>
<html lang="en">
<head>
    <title>Character Limit Checker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 100px; padding: 10px; font-size: 16px; }
        .counter-container { margin-top: 5px; font-weight: bold; text-align: right; }
        .warning { color: red; }
    </style>
</head>
<body>

    <h2>Post a Comment</h2>
    <textarea id="myBox" placeholder="What's on your mind?" maxlength="200"></textarea>
    
    <div class="counter-container">
        Characters remaining: <span id="charCount">200</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
