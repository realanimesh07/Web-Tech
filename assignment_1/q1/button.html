<!DOCTYPE html>
<html>
<head>
    <title>Display Message</title>
</head>
<body>
    <button class="js-display-button">
        Display
    </button>
    <p class="js-para"></p>
    <script>
        
        let count = 0;
        document.querySelector('.js-display-button').addEventListener('click',
            () => {
            count ++;
            document.querySelector('.js-para').innerHTML = `Button was clicked ${count} times`
            }
        );
    </script>
</body>
</html>
