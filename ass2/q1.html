<!DOCTYPE html>
<head>
    <title>Even or Odd Checker</title>
</head>
<body>

    <div class="container">
        <h2>Even or Odd Checker</h2>
        <label for="numberInput">Enter a number:</label><br>
        <input type="number" id="numberInput" placeholder="Type here..."><br>
        
        <button onclick="checkNumber()">Check Number</button>
        
        <p id="result"></p>
    </div>

    <script>
        function checkNumber() {
            const inputVal = document.getElementById('numberInput').value;
            const resultDisplay = document.getElementById('result');

            if (inputVal === "") {
                resultDisplay.style.color = "red";
                resultDisplay.textContent = "Please enter a number first.";
                return;
            }
            
            const number = Number(inputVal);

            if (number % 2 === 0) {
                resultDisplay.style.color = "green";
                resultDisplay.textContent = number + " is an Even number.";
            } else {
                resultDisplay.style.color = "blue";
                resultDisplay.textContent = number + " is an Odd number.";
            }
        }
    </script>

</body>
</html>
