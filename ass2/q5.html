<!DOCTYPE html>
<head>
    <title>Date and Time Display</title>
</head>
<body>

    <div class="container">
        <h2>Current Date & Time</h2>
        <button onclick="showDateTime()">Get Current Time</button>
        
        <div id="displayArea"></div>
    </div>

    <script>
        function showDateTime() {
            const now = new Date();

            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const dayName = days[now.getDay()];

            const dateStr = now.toLocaleDateString(); 
            const timeStr = now.toLocaleTimeString();

            const output = `
                Today is <span class="highlight">${dayName}</span><br>
                Date: <strong>${dateStr}</strong><br>
                Time: <strong>${timeStr}</strong>
            `;
            document.getElementById('displayArea').innerHTML = output;
        }
    </script>

</body>
</html>
