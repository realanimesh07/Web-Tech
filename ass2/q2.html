<!DOCTYPE html>
<head>
    <title>Square and Cube Calculator</title>
</head>
<body>

    <div class="container">
        <h2>Math Calculator</h2>
        <label for="numInput">Enter a number:</label>
        <input type="number" id="numInput" placeholder="Enter number here...">

        <button onclick="calculateValues()">Calculate</button>

        <div id="outputSection" style="display:none;" class="result-box">
            <p><strong>Square:</strong> <span id="squareResult"></span></p>
            <p><strong>Cube:</strong> <span id="cubeResult"></span></p>
        </div>
    </div>

    <script>
        function calculateValues() {
            const input = document.getElementById('numInput').value;
            const outputSection = document.getElementById('outputSection');

            if (input === "") {
                alert("Please enter a number first!");
                return;
            }

            const number = Number(input);

            const square = number * number; 
            const cube = number * number * number;

            document.getElementById('squareResult').textContent = square;
            document.getElementById('cubeResult').textContent = cube;

            outputSection.style.display = "block";
        }
    </script>

</body>
</html>
