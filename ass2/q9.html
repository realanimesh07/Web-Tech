<!DOCTYPE html>
<head>
    <title>Find Largest Number</title>
</head>
<body>

    <div class="container">
        <h2>Find the Largest</h2>
        
        <input type="number" id="num1" placeholder="First Number">
        <input type="number" id="num2" placeholder="Second Number">
        <input type="number" id="num3" placeholder="Third Number">

        <button onclick="findLargest()">Find Largest</button>

        <div id="result">Result will appear here</div>
    </div>

    <script>
        function findLargest() {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const n3 = parseFloat(document.getElementById('num3').value);

            const resultBox = document.getElementById('result');

            if (isNaN(n1) || isNaN(n2) || isNaN(n3)) {
                resultBox.textContent = "Please enter valid numbers in all fields.";
                resultBox.style.color = "red";
                return;
            }

            const largest = Math.max(n1, n2, n3);

            resultBox.style.color = "#333";
            resultBox.textContent = "The largest number is: " + largest;
        }
    </script>

</body>
</html>
